name: Weekly Company Discovery

on:
#   schedule:
#     - cron: '0 1 * * 0'   # Every Sunday 06:30 AM IST (01:00 UTC)
  workflow_dispatch:        # Manual trigger via GitHub UI or API

jobs:
  discover:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Company Discovery Scraper
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:              ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
          SERPER_KEY:                ${{ secrets.SERPER_KEY }}
          GEMINI_API_KEY:            ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN:              ${{ secrets.GITHUB_TOKEN }}
        run: python scrapers/company_discovery.py
