name: Network Growth Scraper
on:
  # schedule:
  #   - cron: '30 3 * * *' # Every day at 09:00 AM IST (03:30 UTC)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Network Growth Scraper
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SERPAPI_KEY:               ${{ secrets.SERPAPI_KEY }}
          SERPER_2_NETWORK_KEY:      ${{ secrets.SERPER_2_NETWORK_KEY }}
          SERPER_3_NETWORK_KEY:      ${{ secrets.SERPER_3_NETWORK_KEY }}
        run: python scrapers/network_growth.py
